<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ポケカABC - 対戦ビジュアライザ</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="/static/visualizer.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <h1>Pokémon TCG AI - 対戦ビジュアライザ</h1>
            <div class="header-right">
                <div class="nav-links">
                    <a href="/" class="nav-link">トレーニング</a>
                    <a href="/visualizer" class="nav-link active">対戦ビジュアライザ</a>
                </div>
            </div>
        </header>

        <!-- 設定パネル -->
        <section class="card config-panel">
            <h2>シミュレーション設定</h2>
            <div class="config-grid">
                <div class="config-item">
                    <label for="agent-p0">プレイヤー1 (先攻/自分):</label>
                    <select id="agent-p0">
                        <option value="pytorch_rl">PyTorch強化学習 (pytorch_rl)</option>
                        <option value="evolutionary">進化計算エージェント (evolutionary)</option>
                        <option value="mcts">モンテカルロ木探索 (mcts)</option>
                        <option value="rl">強化学習 (rl)</option>
                        <option value="random">ランダムエージェント (random)</option>
                    </select>
                </div>
                <div class="config-item">
                    <label for="agent-p1">プレイヤー2 (後攻/相手):</label>
                    <select id="agent-p1">
                        <option value="random" selected>ランダムエージェント (random)</option>
                        <option value="pytorch_rl">PyTorch強化学習 (pytorch_rl)</option>
                        <option value="evolutionary">進化計算エージェント (evolutionary)</option>
                        <option value="mcts">モンテカルロ木探索 (mcts)</option>
                        <option value="rl">強化学習 (rl)</option>
                    </select>
                </div>
                <button id="btn-simulate" class="btn btn-primary">対戦シミュレーション開始</button>
            </div>
        </section>

        <!-- 対戦結果バナー -->
        <div id="battle-result-banner" class="battle-result-banner hidden"></div>

        <!-- メイン対戦画面エリア（シミュレーション後に表示） -->
        <div id="battle-area" class="battle-area hidden">
            <!-- 盤面可視化 -->
            <div class="board-container">
                <!-- 相手の場 (Opponent Field) -->
                <div class="player-field opponent-field">
                    <div class="player-info">
                        <span class="player-badge">P2: 相手 (後攻)</span>
                        <div class="hand-container" id="opp-hand">
                            <!-- 相手の手札 (裏向き) -->
                        </div>
                    </div>
                    
                    <div class="field-slots">
                        <!-- サイド -->
                        <div class="side-cards" id="opp-prizes"></div>
                        
                        <!-- ベンチ -->
                        <div class="bench-slots" id="opp-bench"></div>
                        
                        <!-- バトル場 -->
                        <div class="active-wrapper">
                            <div class="active-slot" id="opp-active"></div>
                        </div>

                        <!-- デッキとトラッシュ -->
                        <div class="pile-slots">
                            <div class="pile deck-pile" id="opp-deck">山札<br><span class="count">0</span></div>
                            <div class="pile discard-pile" id="opp-discard">トラッシュ<br><span class="count">0</span></div>
                        </div>
                    </div>
                </div>

                <!-- スタジアム & コントロール共通エリア -->
                <div class="mid-field">
                    <div class="stadium-slot" id="stadium-area">
                        <div class="stadium-placeholder">スタジアムなし</div>
                    </div>
                    
                    <div class="control-panel-mini">
                        <div class="step-info">
                            <span id="current-step">0</span> / <span id="total-steps">0</span>
                        </div>
                        <div class="ctrl-buttons">
                            <button id="ctrl-first" class="btn-ctrl" title="最初へ">|&lt;</button>
                            <button id="ctrl-prev" class="btn-ctrl" title="戻る">&lt;</button>
                            <button id="ctrl-play" class="btn-ctrl btn-play" title="再生/一時停止">▶</button>
                            <button id="ctrl-next" class="btn-ctrl" title="進む">&gt;</button>
                            <button id="ctrl-last" class="btn-ctrl" title="最後へ">&gt;|</button>
                        </div>
                        <div class="speed-control">
                            <label for="play-speed">再生速度:</label>
                            <select id="play-speed">
                                <option value="2000">遅い (2s)</option>
                                <option value="1000" selected>普通 (1s)</option>
                                <option value="500">速い (0.5s)</option>
                                <option value="200">超高速 (0.2s)</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- 自分の場 (Your Field) -->
                <div class="player-field your-field">
                    <div class="field-slots">
                        <!-- サイド -->
                        <div class="side-cards" id="your-prizes"></div>

                        <!-- ベンチ -->
                        <div class="bench-slots" id="your-bench"></div>

                        <!-- バトル場 -->
                        <div class="active-wrapper">
                            <div class="active-slot" id="your-active"></div>
                        </div>

                        <!-- デッキとトラッシュ -->
                        <div class="pile-slots">
                            <div class="pile deck-pile" id="your-deck">山札<br><span class="count">0</span></div>
                            <div class="pile discard-pile" id="your-discard">トラッシュ<br><span class="count">0</span></div>
                        </div>
                    </div>

                    <div class="player-info">
                        <span class="player-badge">P1: 自分 (先攻)</span>
                        <div class="hand-container" id="your-hand">
                            <!-- 自分の手札 (表向き) -->
                        </div>
                    </div>
                </div>
            </div>

            <!-- サイドバー：バトルログ & 詳細情報 -->
            <div class="sidebar-container">
                <div class="card detail-panel">
                    <h2>カード詳細</h2>
                    <div id="card-detail-content">
                        <p class="placeholder-text">カードをホバーまたはクリックすると詳細が表示されます。</p>
                    </div>
                </div>
                
                <div class="card log-panel">
                    <h2>対戦ログ</h2>
                    <div class="log-list" id="log-list">
                        <!-- 対戦ログ履歴 -->
                    </div>
                </div>
            </div>
        </div>

        <!-- ローディング表示 -->
        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <p>対戦シミュレーション中...</p>
        </div>
    </div>

    <!-- カード詳細モーダルやツールチップ用のコンテナ -->
    <div id="tooltip" class="tooltip hidden"></div>

    <script src="/static/visualizer.js"></script>
</body>
</html>
